name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      id-token: write
      attestations: write
      contents: read


    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build EXE
      run: cargo build --workspace --release

    - name: Prepare EXE for upload
      run: Copy-Item -Path target\release\logic_simulator_desktop.exe -Destination target\release\logic_simulator.exe



    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: logic-simulator-alpha-exe
        path: target/release/logic_simulator.exe

    - name: Generate Build Attestation
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: 'target/release/logic_simulator.exe'

    - name: VirusTotal Scan
      uses: crazy-max/ghaction-virustotal@v5
      with:
        vt_api_key: ${{ secrets.VT_API_KEY }}
        files: |
          target/release/logic_simulator.exe

