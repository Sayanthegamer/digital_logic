name: Publish GitHub Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      id-token: write
      attestations: write
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build EXE
      run: cargo build --release

    - name: Generate self-signed certificate and sign EXE
      shell: powershell
      env:
        CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
      run: |
        $pwd = ConvertTo-SecureString -String $env:CERT_PASSWORD -Force -AsPlainText
        $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=Sayan Das" -KeyUsage DigitalSignature -FriendlyName "Sayan Das" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}") -NotAfter (Get-Date).AddYears(10)
        Export-PfxCertificate -Cert $cert -FilePath cert.pfx -Password $pwd

        $sdkDir = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.*" -Directory | Sort-Object Name -Descending | Select-Object -First 1
        $signtool = Join-Path $sdkDir.FullName "x64\signtool.exe"
        if (-not (Test-Path $signtool)) { throw "signtool.exe not found at $signtool" }
        & $signtool sign /v /f cert.pfx /p $env:CERT_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 target/release/logic_simulator_bin.exe



    - name: Generate Build Attestation
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: 'target/release/logic_simulator_bin.exe'

    - name: VirusTotal Scan
      uses: crazy-max/ghaction-virustotal@v5
      with:
        vt_api_key: ${{ secrets.VT_API_KEY }}
        files: |
          target/release/logic_simulator_bin.exe

    - name: Upload Windows Asset
      uses: actions/upload-artifact@v4
      with:
        name: windows-release-bin
        path: target/release/logic_simulator_bin.exe

  build-android:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      with:
        packages: "platforms;android-34 build-tools;34.0.0 platform-tools"

    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android, armv7-linux-androideabi

    - name: Setup NDK
      id: setup-ndk
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    - name: Build Rust Libraries for Android
      env:
        ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        cargo ndk -t arm64-v8a -t armeabi-v7a -o android/app/src/main/jniLibs build --release

    - name: Generate Gradle Wrapper
      run: |
        cd android
        gradle wrapper --gradle-version 8.5

    - name: Build Android APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Generate self-signed keystore
      run: keytool -genkey -v -keystore release.keystore -alias release-key -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android, O=Android, C=US" -storepass android -keypass android

    - name: Sign APK
      run: |
        /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign --ks release.keystore --ks-pass pass:android --key-pass pass:android --out android/app/build/outputs/apk/release/logic_simulator.apk android/app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Generate Build Attestation
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: 'android/app/build/outputs/apk/release/logic_simulator.apk'

    - name: VirusTotal Scan
      uses: crazy-max/ghaction-virustotal@v5
      with:
        vt_api_key: ${{ secrets.VT_API_KEY }}
        files: |
          android/app/build/outputs/apk/release/logic_simulator.apk

    - name: Upload Android Asset
      uses: actions/upload-artifact@v4
      with:
        name: android-release-bin
        path: android/app/build/outputs/apk/release/logic_simulator.apk

  publish-release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Download Windows Asset
      uses: actions/download-artifact@v4
      with:
        name: windows-release-bin
        path: ./release-assets

    - name: Download Android Asset
      uses: actions/download-artifact@v4
      with:
        name: android-release-bin
        path: ./release-assets

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./release-assets/logic_simulator_bin.exe
          ./release-assets/logic_simulator.apk
        draft: false
        prerelease: false
        generate_release_notes: true
